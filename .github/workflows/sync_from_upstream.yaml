name: Sync from Upstream

# Manually triggered sync from revisit-studies/study (the main framework repo).
# Resets the replication-studies branch to exactly match upstream, then restores
# replication-study files on top and force-pushes. This keeps this repository
# from falling behind upstream in git history.

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream branch or tag to sync from (e.g. main, v2.3.2)'
        required: false
        default: 'main'

# Uses the org-level PAT secret for checkout so that git push can update
# .github/workflows/ files. GITHUB_TOKEN cannot push workflow file changes;
# a PAT with 'repo' and 'workflow' scopes is required.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout replication-studies repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Fetch upstream and reset to match it
        run: |
          # Save the current repository HEAD so we can restore replication-study
          # files after the reset.
          echo "REPLICATION_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

          git remote add upstream https://github.com/revisit-studies/study.git
          UPSTREAM_REF="${{ github.event.inputs.upstream_ref }}"
          git fetch upstream "${UPSTREAM_REF:-main}"
          UPSTREAM_SHA=$(git rev-parse FETCH_HEAD)
          echo "UPSTREAM_SHA=$UPSTREAM_SHA" >> "$GITHUB_ENV"
          echo "Syncing from upstream @ $UPSTREAM_SHA"

          # Reset the working tree to exactly match upstream. This handles
          # additions, modifications, and deletions in one step, and aligns
          # the branch history so this repository is no longer "behind" upstream.
          git reset --hard FETCH_HEAD

      - name: Restore replication-studies files
        run: |
          # These files are intentionally different in replication-studies and must
          # be restored from before the reset.
          # Note: public/global.json is handled separately below so the schema
          # version is always taken from upstream rather than frozen in REPLICATION_HEAD.
          git checkout "$REPLICATION_HEAD" -- \
            README.md \
            .github/workflows/sync_from_upstream.yaml \
            .github/workflows/sync_from_upstream_test.yaml \
            public/255chart-study \
            public/HeatmapJND-study \
            public/HeatmapJNDNegative-study \
            public/HexbinJND-study \
            public/HexbinJNDNegative-study \
            public/ParallelJND-study \
            public/ParallelJNDNegative-study \
            public/ScatterJND-study \
            public/ScatterJNDNegative-study \
            public/bubblechart-study \
            public/jnd-data \
            public/pattern-design-study \
            src/public/bubblechart-study \
            src/public/jnd-replication

      - name: Restore replication global.json with upstream schema version
        run: |
          node -e "
            const fs = require('fs');
            const { execFileSync } = require('child_process');
            const upstream = JSON.parse(fs.readFileSync('public/global.json', 'utf8'));
            const previous = JSON.parse(execFileSync(
              'git',
              ['show', process.env.REPLICATION_HEAD + ':public/global.json'],
              { encoding: 'utf8' },
            ));
            previous['\$schema'] = upstream['\$schema'];
            fs.writeFileSync('public/global.json', JSON.stringify(previous, null, 2) + '\n');
          "

      - name: Remove upstream demo folders not used by replication-studies
        run: |
          # Top-level public/: keep shared framework assets, libraries, and
          # the replication studies listed in public/global.json.
          KEEP_PUBLIC=(
            "255chart-study"
            "404.html"
            "HeatmapJND-study"
            "HeatmapJNDNegative-study"
            "HexbinJND-study"
            "HexbinJNDNegative-study"
            "ParallelJND-study"
            "ParallelJNDNegative-study"
            "README.md"
            "ScatterJND-study"
            "ScatterJNDNegative-study"
            "bubblechart-study"
            "global.json"
            "jnd-data"
            "libraries"
            "library-demographics"
            "library-mic-check"
            "pattern-design-study"
            "revisitAssets"
            "revisitUtilities"
            "vite.svg"
          )
          for item in public/*; do
            name=$(basename "$item")
            keep=false
            for k in "${KEEP_PUBLIC[@]}"; do
              [[ "$name" == "$k" ]] && keep=true && break
            done
            if [[ "$keep" == false ]]; then
              echo "Removing non-replication public item: $item"
              rm -rf "$item"
            fi
          done

          # src/public/: keep shared library React components plus custom
          # replication React components.
          KEEP_SRC_PUBLIC=("libraries" "bubblechart-study" "jnd-replication")
          for item in src/public/*; do
            [[ -e "$item" ]] || continue
            name=$(basename "$item")
            keep=false
            for k in "${KEEP_SRC_PUBLIC[@]}"; do
              [[ "$name" == "$k" ]] && keep=true && break
            done
            if [[ "$keep" == false ]]; then
              echo "Removing non-replication src/public item: $item"
              rm -rf "$item"
            fi
          done

      - name: Remove dependencies only used by removed upstream demos
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

            const unusedDeps = [
              '@visdesignlab/upset2-react',
              'arquero',
              'topojson-client',
              '@emotion/react',
              '@emotion/styled',
              '@mui/icons-material',
              '@mui/material',
              '@mui/system',
              '@mui/x-data-grid',
              'recoil',
            ];
            unusedDeps.forEach((dep) => {
              if (pkg.dependencies && dep in pkg.dependencies) {
                console.log('Removing unused dep:', dep);
                delete pkg.dependencies[dep];
              }
            });

            const unusedDevDeps = [
              '@types/topojson-client',
              '@types/topojson-specification',
            ];
            unusedDevDeps.forEach((dep) => {
              if (pkg.devDependencies && dep in pkg.devDependencies) {
                console.log('Removing unused devDep:', dep);
                delete pkg.devDependencies[dep];
              }
            });

            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit and force push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected — replication-studies is already up to date with upstream."
          else
            SHORT_SHA="${UPSTREAM_SHA:0:7}"
            git commit -m "chore: sync from upstream revisit-studies/study@${SHORT_SHA}"
            git push --force origin main
            echo "Force-pushed sync commit to main."
          fi
